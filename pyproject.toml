[project]
name = "tp-ia-ippsi-2026"
version = "0.1.0"
description = "Data exploration and AI/ML pipeline project"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "matplotlib>=3.10.9",
    "pandas>=3.0.3",
    "scikit-learn>=1.9.0",
    "scipy>=1.17.1",
    "seaborn>=0.13.2",
    "statsmodels>=0.14.6",
    "xgboost>=3.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tp_ia", "src/tp_data", "src/tp_ia_2_j3"]

[dependency-groups]
dev = [
    "hatchling>=1.30.1",
    "ruff>=0.15.16",
]

[tool.ruff]
src = ["src"]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]
